version: '3'

services:

  nginx:
    # Container name created by Docker
    container-name: nginx
    # Path to repository to build Docker image
    build: 
      ./requirements/nginx
    # Input and output of one Docker container, here listen on 443th and send on 443th port. [listen:send]
    ports:
      -443:443
    # Define persistants volumes to store data permanently outside the container.
    volumes:
      - wordpress_data:/var/www/html
    # Automatically restarts the container if it stops regardless of the exit code. 
    restart:
      always
    # Define Docker networks which this service will connect to.
    # -network: alias redirecting to section networks in the Docker-compose.
    networks:
      -network
    # Load environment varaibles from file .env, shared by every service in the Docker compose
    env_file:
      - .env

  mariadb:
    container_name: mariadb
    build: 
      ./requirements/mariadbd
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - network
    restart: 
      always
    env_file:
      - .env
  
  wordpress:
    container_name: wordpress
    # Create a dependency, Wordpress will wait until MariaDB is ready.
    depends_on:
      - mariadb
    build:
      context: 
        ./requirements/wordpress
      dockerfile: 
        Dockerfile
    restart:
      always
    env_file:
      - .env
    volumes:
      -wordpress_data:/var/www/html
    networks:
      - network


# driver_opts - specifies mount options:
#   type: none - means we're providing a device path (not using a standard filesystem type).
#   device - the actual directory path on the host machine where data will be stored.
#   o: bind - bind-mounts the host directory into the container as a volume.

# Each volume (mariadb_data, wordpress_data) is bound to a host directory to preserve data.
volumes:
  mariadb_data:
    # Uses local storage driver on the host machine.
    driver: local
    # Driver options.
    driver_opts:
      # none = we need to provide a device path for the volume.
      type: none
      # Set the device path.
      device: /home/jdupuis/data/mysql
      # Bind-mount: links host directory directly to the container (bidirectional sync).
      o: bind
      
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      device: /home/jdupuis/data/wordpress
      o: bind

networks:
  # Enable communication between containers in the same network ( nginx, mariadb, wordpress ).
  network:
    driver: bridge