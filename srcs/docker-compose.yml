services:

  nginx:
    # Container name created by Docker
    container_name: nginx
    # Path to repository to build Docker image
    build: 
      context: ./requirements/nginx
    # Input and output of one Docker container, listen on ports 80 (HTTP redirect) and 443 (HTTPS)
    ports:
      - "80:80"
      - "443:443"
    # Define persistants volumes to store data permanently outside the container.
    volumes:
      - wordpress_data:/var/www/html
    # Automatically restarts the container if it stops regardless of the exit code. 
    restart:
      always
    # Define Docker networks which this service will connect to.
    networks:
      - network
    # Load environment variables from file .env, shared by every service in the Docker compose
    env_file:
      - .env
    depends_on:
      - wordpress

  mariadb:
    container_name: mariadb
    build: 
      context: ./requirements/mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - network
    restart: 
      always
    env_file:
      - .env
    # Use Docker secrets for sensitive data
    secrets:
      - db_password
      - db_root_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$$(cat /run/secrets/db_password) || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  
  wordpress:
    container_name: wordpress
    # Create a dependency, Wordpress will wait until MariaDB is ready.
    depends_on:
      mariadb:
        condition: service_healthy
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    restart:
      always
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - network
    # Use Docker secrets for sensitive data
    secrets:
      - db_password

# Each volume (mariadb_data, wordpress_data) is bound to a host directory to preserve data.
volumes:
  mariadb_data:
    # Uses local storage driver on the host machine.
    driver: local
    # Driver options.
    driver_opts:
      # none = we need to provide a device path for the volume.
      type: none
      # Set the device path.
      device: ${HOME}/data/mysql
      # Bind-mount: links host directory directly to the container (bidirectional sync).
      o: bind
    
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      device: ${HOME}/data/wordpress
      o: bind

# Docker secrets - stored securely and passed to containers as files
secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt

networks:
  # Enable communication between containers in the same network ( nginx, mariadb, wordpress ).
  network:
    driver: bridge