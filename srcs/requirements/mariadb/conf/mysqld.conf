[mysqld] # Section configuration for MySQL/MariaDB daemon

user = root # Run MySQL service with root privileges
port = 3306 # Listen on default MySQL port (3306)
datadir = /var/lib/mysql # Directory where database files are stored
socket = /var/run/mysqld/mysqld.sock # Unix socket file for local connections
skip-networking = false # Enable network connections (not disabled)
bind-address = 0.0.0.0 # Listen on all network interfaces (all IPs)